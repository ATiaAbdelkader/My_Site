<!doctype html>
<html lang="en" dir="ltr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 - Page Not Found | Abdelkader Atia</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
 </head>
 <body class="h-full page-404 overflow-auto" id="app-body">
  <section class="hero-bg relative min-h-full flex items-center justify-center">
   <div class="max-w-2xl mx-auto px-4 text-center">
    <div class="text-8xl mb-6">🌾</div>
    <h1 class="text-8xl font-900 gradient-text mb-4">404</h1>
    <p class="text-gray-400 text-xl mb-2">This page seems to have wandered off the farm.</p>
    <p class="text-gray-500 mb-8">The link you followed may be broken or the page has been moved.</p>
    <div class="flex flex-wrap justify-center gap-4">
     <a href="/" class="btn-primary text-white px-7 py-3 rounded-xl font-semibold text-sm flex items-center gap-2">
      <i data-lucide="home" style="width:16px;height:16px"></i> <span>Back to Home (AR)</span>
     </a>
     <a href="/index-en.html" class="btn-outline text-cyan-400 px-7 py-3 rounded-xl font-semibold text-sm flex items-center gap-2">
      <i data-lucide="globe" style="width:16px;height:16px"></i> <span>English Version</span>
     </a>
     <a href="/index-fr.html" class="btn-outline text-cyan-400 px-7 py-3 rounded-xl font-semibold text-sm flex items-center gap-2">
      <i data-lucide="globe" style="width:16px;height:16px"></i> <span>Version Française</span>
     </a>
    </div>
    <div class="mt-12 text-gray-600 text-xs">© 2026 Abdelkader Atia</div>
   </div>
  </section>
  <script>
   lucide.createIcons();
   document.getElementById('app-body').addEventListener('scroll', function() {
    const nav = document.getElementById('navbar');
    if (nav) {
     if (this.scrollTop > 80) {
      nav.style.background = 'rgba(10, 14, 39, 0.95)';
      nav.style.backdropFilter = 'blur(16px)';
     } else {
      nav.style.background = 'transparent';
      nav.style.backdropFilter = 'none';
     }
    }
   });
  </script>
 </body>
</html>
